name: "Build Unsigned Artifacts ✈️"
on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab
  repository_dispatch:
    types: [build-unsigned]

jobs:
  build:
    name: "Build iOS & tvOS Apps"
    runs-on: macos-15 # GitHub hosted macOS runner
    env:
      DEFAULT_IOS_SCHEME: "Swiftfin"
      DEFAULT_TVOS_SCHEME: "Swiftfin tvOS"
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.ref || 'main' }}
        fetch-depth: 0

    - name: git Checkout
      if: ${{ github.event.client_payload.hasCheckoutCommit }}
      run: |
        git checkout ${{ github.event.client_payload.commitSHA }}

    - name: Install SwiftGen
      run: brew install swiftgen

    - name: Update Carthage
      run: carthage update --use-xcframeworks --cache-builds

    - name: Build iOS App (Unsigned)
      run: |
        xcodebuild clean build \
          -scheme "$DEFAULT_IOS_SCHEME" \
          -destination "generic/platform=iOS" \
          -skipMacroValidation \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/ios"

    - name: Package iOS IPA
      run: |
        cd $RUNNER_TEMP/build/ios
        mkdir Payload
        mv *.app Payload/
        zip -r Swiftfin-iOS.ipa Payload

    - name: Build tvOS App (Unsigned)
      run: |
        xcodebuild clean build \
          -scheme "$DEFAULT_TVOS_SCHEME" \
          -destination "generic/platform=tvOS" \
          -skipMacroValidation \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build/tvos"

    - name: Package tvOS IPA
      run: |
        cd $RUNNER_TEMP/build/tvos
        mkdir Payload
        mv *.app Payload/
        zip -r Swiftfin-tvOS.ipa Payload

    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-iOS-IPA
        path: ${{ runner.temp }}/build/ios/Swiftfin-iOS.ipa
        retention-days: 7

    - name: Upload tvOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-tvOS-IPA
        path: ${{ runner.temp }}/build/tvos/Swiftfin-tvOS.ipa
        retention-days: 7
