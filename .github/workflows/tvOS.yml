name: "Sideload Build 📦"

on:
  schedule:
    # Runs at 17:00 UTC on the 1st of every month
    - cron: '0 17 1 * *'
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: "Build Unsigned Apple TV IPA"
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        brew install swiftgen

    - name: Fetch TVVLCKit Manually
      run: |
        mkdir -p Carthage/Build
        # Downloads the stable 3.7.0 binary for tvOS to prevent Carthage timeouts
        curl -L https://videolan.mirror.it.fkd.jp/testing/VLCKit-3.7.0/TVVLCKit-3.7.0.xcframework.zip -o TVVLCKit.zip
        unzip -q TVVLCKit.zip -d Carthage/Build/
        rm TVVLCKit.zip
        # Ensures the framework is in the path required by the project
        ls -d Carthage/Build/TVVLCKit.xcframework

    - name: Build Unsigned App
      run: |
        xcodebuild build \
          -project Swiftfin.xcodeproj \
          -scheme "Swiftfin tvOS" \
          -configuration Release \
          -destination "generic/platform=tvOS" \
          -derivedDataPath ./derived_data \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS=""

    - name: Package as IPA
      run: |
        mkdir -p Payload
        # Moves the compiled .app into the Payload folder for sideloading
        cp -R ./derived_data/Build/Products/Release-appletvos/*.app ./Payload/
        zip -r Swiftfin-Unsigned.ipa Payload
        
    - name: Upload to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-Unsigned-IPA
        path: Swiftfin-Unsigned.ipa
        retention-days: 7
