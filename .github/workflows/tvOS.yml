name: "Sideload Build 📦"

on:
  schedule:
    # Runs automatically on the 1st of every month
    - cron: '0 17 1 * *'
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    name: "Build Unsigned Apple TV IPA"
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        brew install swiftgen

    - name: Fetch TVVLCKit Manually
      run: |
        mkdir -p Carthage/Build
        # Using the official primary VideoLAN server to avoid mirror/DNS issues
        # We use -f to make curl fail if the download is an error page (like 404)
        curl -L -f "https://download.videolan.org/pub/videolan/testing/VLCKit-3.7.0/TVVLCKit-3.7.0.xcframework.zip" -o TVVLCKit.zip
        unzip -q TVVLCKit.zip -d Carthage/Build/
        rm TVVLCKit.zip
        # Verifies the framework exists at the path required by the xcodebuild command
        ls -d Carthage/Build/TVVLCKit.xcframework

    - name: Build Unsigned App
      run: |
        xcodebuild build \
          -project Swiftfin.xcodeproj \
          -scheme "Swiftfin tvOS" \
          -configuration Release \
          -destination "generic/platform=tvOS" \
          -derivedDataPath ./derived_data \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS=""

    - name: Package as IPA
      run: |
        mkdir -p Payload
        # Moves the compiled .app into the standard IPA structure
        cp -R ./derived_data/Build/Products/Release-appletvos/*.app ./Payload/
        zip -r Swiftfin-Unsigned.ipa Payload
        
    - name: Upload to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-Unsigned-IPA
        path: Swiftfin-Unsigned.ipa
        retention-days: 7
