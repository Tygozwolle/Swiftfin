name: "Build Artifacts 📦"

on:
  schedule:
    # 1st of every month at 17:00 UTC
    - cron: '0 17 1 * *'
  repository_dispatch:
    types: [testflight]
  workflow_dispatch:

jobs:
  build:
    name: "Build and Archive"
    runs-on: macos-15
    env:
      XCODE_VERSION: "26.3"
      DEFAULT_IOS_SCHEME: "Swiftfin"
      DEFAULT_TVOS_SCHEME: "Swiftfin tvOS"

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.ref || 'main' }}
        fetch-depth: 0

    - name: git Checkout (Custom Commit)
      if: ${{ github.event.client_payload.hasCheckoutCommit }}
      run: git checkout ${{ github.event.client_payload.commitSHA }}

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Install SwiftGen
      run: brew install swiftgen

    - name: Update Carthage
      run: carthage update --use-xcframeworks --cache-builds

    - name: Generate Changelog
      id: changelog
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_DATE=$(gh release view --json publishedAt -q '.publishedAt' 2>/dev/null || echo "")
        if [ -n "$RELEASE_DATE" ]; then
          LOG=$(gh pr list --state merged --label "release highlight" --search "merged:>=$RELEASE_DATE" --json title --jq '.[].title' | sed 's/^/- /')
        fi
        
        if [ -z "$LOG" ]; then
          LOG="General performance changes, fixes, and localization changes."
        fi

        {
          echo "changelog<<CHANGELOG_EOF"
          echo "$LOG"
          echo "CHANGELOG_EOF"
        } >> $GITHUB_OUTPUT

    - name: Build Schemes
      run: |
        # Resolve which schemes to build
        if [ -n "${{ github.event.client_payload.scheme }}" ]; then
          SCHEMES=("${{ github.event.client_payload.scheme }}")
        else
          SCHEMES=("$DEFAULT_IOS_SCHEME" "$DEFAULT_TVOS_SCHEME")
        fi

        for scheme in "${SCHEMES[@]}"; do
          echo "🔨 Building scheme: $scheme"
          
          # Added -skipMacroValidation to bypass the macro trust prompt in CI
          xcodebuild build \
            -scheme "$scheme" \
            -configuration Release \
            -derivedDataPath "build_output/$scheme" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -skipMacroValidation
        done

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Build-Output-${{ github.run_id }}
        path: build_output/
        retention-days: 7

    - name: Save Changelog as Artifact
      run: echo "${{ steps.changelog.outputs.changelog }}" > build_output/changelog.txt
