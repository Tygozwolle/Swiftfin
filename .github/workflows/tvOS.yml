name: "Build Unsigned Artifacts ✈️"
on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab
  repository_dispatch:
    types: [build-unsigned]

jobs:
  build:
    name: "Build iOS & tvOS Apps"
    runs-on: macos-15 # GitHub hosted macOS runner
    env:
      DEFAULT_IOS_SCHEME: "Swiftfin"
      DEFAULT_TVOS_SCHEME: "Swiftfin tvOS"
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.ref || 'main' }}
        fetch-depth: 0

    - name: git Checkout
      if: ${{ github.event.client_payload.hasCheckoutCommit }}
      run: |
        git checkout ${{ github.event.client_payload.commitSHA }}

    - name: Install SwiftGen
      run: brew install swiftgen

    - name: Update Carthage
      run: carthage update --use-xcframeworks --cache-builds

    - name: Build iOS App (Unsigned)
      run: |
        DERIVED_DATA="$RUNNER_TEMP/deriveddata_ios"
        mkdir -p "$DERIVED_DATA"
        xcodebuild clean build \
          -scheme "$DEFAULT_IOS_SCHEME" \
          -destination "generic/platform=iOS" \
          -sdk iphoneos \
          -skipMacroValidation \
          -configuration Release \
          -derivedDataPath "$DERIVED_DATA" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          OTHER_SWIFT_FLAGS="-enable-experimental-feature IsolatedDeinit"

    - name: Package iOS IPA
      run: |
        DERIVED_DATA="$RUNNER_TEMP/deriveddata_ios"
        BUILD_DIR="$DERIVED_DATA/Build/Products/Release-iphoneos"
        APP_PATH="$BUILD_DIR/Swiftfin.app"

        if [ ! -d "$APP_PATH" ]; then
          echo "ERROR: app not found at $APP_PATH"
          echo "Dumping $DERIVED_DATA/Build/Products contents:"
          ls -la "$DERIVED_DATA/Build/Products" || true
          exit 1
        fi

        mkdir -p "$RUNNER_TEMP/ios/Payload"
        cp -R "$APP_PATH" "$RUNNER_TEMP/ios/Payload/"
        cd "$RUNNER_TEMP/ios"
        zip -r "$RUNNER_TEMP/build/ios/Swiftfin-iOS.ipa" Payload

    - name: Build tvOS App (Unsigned)
      run: |
        DERIVED_DATA="$RUNNER_TEMP/deriveddata_tvos"
        mkdir -p "$DERIVED_DATA"
        xcodebuild clean build \
          -scheme "$DEFAULT_TVOS_SCHEME" \
          -destination "generic/platform=tvOS" \
          -sdk appletvos \
          -skipMacroValidation \
          -configuration Release \
          -derivedDataPath "$DERIVED_DATA" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          OTHER_SWIFT_FLAGS="-enable-experimental-feature IsolatedDeinit"

    - name: Package tvOS IPA
      run: |
        DERIVED_DATA="$RUNNER_TEMP/deriveddata_tvos"
        BUILD_DIR="$DERIVED_DATA/Build/Products/Release-appletvos"
        APP_PATH="$BUILD_DIR/Swiftfin.app"

        if [ ! -d "$APP_PATH" ]; then
          echo "ERROR: app not found at $APP_PATH"
          echo "Dumping $DERIVED_DATA/Build/Products contents:"
          ls -la "$DERIVED_DATA/Build/Products" || true
          exit 1
        fi

        mkdir -p "$RUNNER_TEMP/tvos/Payload"
        cp -R "$APP_PATH" "$RUNNER_TEMP/tvos/Payload/"
        cd "$RUNNER_TEMP/tvos"
        zip -r "$RUNNER_TEMP/build/tvos/Swiftfin-tvOS.ipa" Payload
    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-iOS-IPA
        path: ${{ runner.temp }}/build/ios/Swiftfin-iOS.ipa
        retention-days: 7

    - name: Upload tvOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-tvOS-IPA
        path: ${{ runner.temp }}/build/tvos/Swiftfin-tvOS.ipa
        retention-days: 7
