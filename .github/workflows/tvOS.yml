name: "Sideload Build 📦"

on:
  schedule:
    - cron: '0 17 1 * *'
  workflow_dispatch:

jobs:
  build:
    name: "Build Unsigned Apple TV IPA"
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        brew install swiftgen
        # Carthage is usually pre-installed, but this ensures it's ready
        brew install carthage 

    # --- CRITICAL: FETCH VLC ENGINE ---
    - name: Cache Carthage
      uses: actions/cache@v4
      id: carthage-cache
      with:
        path: Carthage
        key: ${{ runner.os }}-carthage-${{ hashFiles('**/Cartfile.resolved') }}
        restore-keys: ${{ runner.os }}-carthage-

    - name: Carthage Bootstrap
      if: steps.carthage-cache.outputs.cache-hit != 'true'
      run: |
        # This downloads the pre-built TVVLCKit binary for tvOS
        carthage bootstrap --platform tvos --use-xcframeworks --cache-builds

    # --- BUILD STEP ---
    - name: Build Unsigned App
      run: |
        xcodebuild build \
          -project Swiftfin.xcodeproj \
          -scheme "Swiftfin tvOS" \
          -configuration Release \
          -destination "generic/platform=tvOS" \
          -derivedDataPath ./derived_data \
          -skipMacroValidation \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS=""

    - name: Package as IPA
      run: |
        mkdir -p Payload
        cp -R ./derived_data/Build/Products/Release-appletvos/*.app ./Payload/
        zip -r Swiftfin-Unsigned.ipa Payload
        
    - name: Upload to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Swiftfin-Unsigned-IPA
        path: Swiftfin-Unsigned.ipa
        retention-days: 7
